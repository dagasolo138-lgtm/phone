name: Build Zhixing APK

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - "zhixing-build/**"
      - ".github/workflows/build-zhixing-apk.yml"

permissions:
  contents: read

jobs:
  build-apk:
    if: github.event.pull_request.head.ref == 'build/zhixing-apk-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout isolated APK build branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Reassemble source archive
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64, zipfile

          chunks = sorted(Path("zhixing-build/chunks").glob("[0-9][0-9].txt"))
          if len(chunks) != 9:
              raise SystemExit(f"Expected 9 source chunks, found {len(chunks)}")
          payload = "".join(path.read_text(encoding="utf-8-sig").strip() for path in chunks)
          archive = base64.b64decode(payload, validate=True)
          Path("zhixing-apk-source.zip").write_bytes(archive)
          with zipfile.ZipFile("zhixing-apk-source.zip") as zf:
              bad = zf.testzip()
              if bad:
                  raise SystemExit(f"Corrupt archive member: {bad}")
              zf.extractall(".")
          print(f"Decoded {len(archive)} bytes from {len(chunks)} chunks")
          PY
          test -f zhixing-apk-source/package.json
          test -f zhixing-apk-source/www/index.html

      - name: Install Capacitor dependencies
        working-directory: zhixing-apk-source
        run: npm install --no-audit --no-fund

      - name: Generate Android project
        working-directory: zhixing-apk-source
        run: |
          npx cap add android
          npx cap sync android

      - name: Build debug APK
        working-directory: zhixing-apk-source/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Collect APK and update key
        shell: bash
        run: |
          set -euo pipefail
          APK="zhixing-apk-source/android/app/build/outputs/apk/debug/app-debug.apk"
          KEYSTORE="$HOME/.android/debug.keystore"
          test -f "$APK"
          test -f "$KEYSTORE"
          mkdir -p apk-output
          cp "$APK" apk-output/zhixing-v1-debug.apk
          cp "$KEYSTORE" apk-output/zhixing-update-key.jks
          cat > apk-output/UPDATE-KEY.txt <<'TXT'
          Keep zhixing-update-key.jks for future APK updates.
          Alias: androiddebugkey
          Keystore password: android
          Key password: android
          Package ID: com.huang.zhixing
          TXT
          sha256sum apk-output/zhixing-v1-debug.apk apk-output/zhixing-update-key.jks > apk-output/SHA256SUMS.txt
          ls -lh apk-output/

      - name: Upload installable APK and update key
        uses: actions/upload-artifact@v4
        with:
          name: zhixing-android-apk
          path: apk-output/
          if-no-files-found: error
          retention-days: 30
